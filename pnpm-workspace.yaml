packages:
  - "apps/*"
  - "packages/*"

# Centralized versions for cross-package dependencies. Bump here once and
# every workspace package picks it up. Peer-dependency ranges in individual
# packages stay literal (they describe what's acceptable, not what's pinned).
catalog:
  # framework
  next: ^16.2.4
  react: 19.2.3
  react-dom: 19.2.3

  # types
  "@types/node": ^24.0.0
  "@types/react": ^19.0.0
  "@types/react-dom": ^19.0.0

  # core tooling
  typescript: ^5.7.0
  zod: ^4.4.3

  # UI
  "@tailwindcss/postcss": ^4
  tailwindcss: ^4.0.0
  lucide-react: ^0.575.0
  mapbox-gl: ^3.21.0

  # auth
  better-auth: ^1.4.20
