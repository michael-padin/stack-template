# Local development database.
# Plain Postgres — this base template is not spatial.
# The `feat/geo` branch swaps this image for `postgis/postgis:16-3.4`.
#
# Matches the default DATABASE_URL in the .env.example files:
#   postgresql://postgres:postgres@localhost:5432/app
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
